<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8" />
        <title>Kelp</title>
        <meta
            name="description"
            content="A UI library for people who love HTML, powered by modern CSS and Web Components."
        />

        <!-- Mobile Screen Resizing -->
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <link rel="stylesheet" type="text/css" href="styles.css" />

        <!-- Kelp CSS -->
        <!-- <link rel="stylesheet" type="text/css" href="./modules/css/kelp.css" /> -->

        <!-- Dark Mode -->
        <!-- <script src="./modules/js/dark-mode-auto.js"></script> -->
    </head>

    <body>

        <section class="dev-media-playback container-2xl">

            <style>
                .dev-media-playback__example [role="list"] {
                    position: relative;
                    display: flex;
                    flex-flow: column nowrap;
                    gap: 24px;
                }
            </style>

            <h2 class="h1">Media Playback Component</h2>

            <p>
                Prototyped on Codepen:
                <a href="https://codepen.io/csatch/pen/ZEZVayv" target="_blank" rel="noopener">
                    https://codepen.io/csatch/pen/ZEZVayv
                </a>
            </p>

            <div class="dev-media-playback__example">

                <kelp-media-playback loading-delay="1s">

                    <video
                        src="./chrissatchell_beach_video.mp4"
                        width="1440"
                        height="810"
                        preload="auto"
                        muted
                        playsinline
                        autoplay
                        controls>
                    </video>

                    <button>
                        <span class="loading">
                            <svg
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 640 640"
                            >
                                <path
                                    d="M286.7 96.1C291.7 113 282.1 130.9 265.2 135.9C185.9 159.5 128.1 233 128.1 320C128.1 426 214.1 512 320.1 512C426.1 512 512.1 426 512.1 320C512.1 233.1 454.3 159.6 375 135.9C358.1 130.9 348.4 113 353.5 96.1C358.6 79.2 376.4 69.5 393.3 74.6C498.9 106.1 576 204 576 320C576 461.4 461.4 576 320 576C178.6 576 64 461.4 64 320C64 204 141.1 106.1 246.9 74.6C263.8 69.6 281.7 79.2 286.7 96.1z"
                                />
                            </svg>
                        </span>

                        <span class="play">
                            <span class="play__entity-icon">&#9654;</span>
                            <svg
                                hidden
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 640 640"
                            >
                                <path
                                    d="M320 112C434.9 112 528 205.1 528 320C528 434.9 434.9 528 320 528C205.1 528 112 434.9 112 320C112 205.1 205.1 112 320 112zM320 576C461.4 576 576 461.4 576 320C576 178.6 461.4 64 320 64C178.6 64 64 178.6 64 320C64 461.4 178.6 576 320 576zM276.5 211.5C269.1 207 259.8 206.8 252.2 211C244.6 215.2 240 223.3 240 232L240 408C240 416.7 244.7 424.7 252.3 428.9C259.9 433.1 269.1 433 276.6 428.4L420.6 340.4C427.7 336 432.1 328.3 432.1 319.9C432.1 311.5 427.7 303.8 420.6 299.4L276.6 211.4zM362 320L288 365.2L288 274.8L362 320z"
                                />
                            </svg>
                        </span>

                        <span class="pause">
                            <span class="pause__entity-icon">⏸</span>
                            <svg
                                hidden
                                xmlns="http://www.w3.org/2000/svg"
                                viewBox="0 0 640 640"
                            >
                                <path
                                    d="M320 112C434.9 112 528 205.1 528 320C528 434.9 434.9 528 320 528C205.1 528 112 434.9 112 320C112 205.1 205.1 112 320 112zM320 576C461.4 576 576 461.4 576 320C576 178.6 461.4 64 320 64C178.6 64 64 178.6 64 320C64 461.4 178.6 576 320 576zM288 248C288 234.7 277.3 224 264 224C250.7 224 240 234.7 240 248L240 392C240 405.3 250.7 416 264 416C277.3 416 288 405.3 288 392L288 248zM400 248C400 234.7 389.3 224 376 224C362.7 224 352 234.7 352 248L352 392C352 405.3 362.7 416 376 416C389.3 416 400 405.3 400 392L400 248z"
                                />
                            </svg>
                        </span>

                        <span class="replay" style="font-size: 1.25rem"> &#8634; </span>
                    </button>
                </kelp-media-playback>

                <div class="notes">
                    <h3 class="h2">Events</h3>

                    <ul>
                        <li>pointer:click/tap</li>
                        <li>keyup:spacebar</li>
                        <li>keydown:enter</li>
                        <li>media:ended/onended</li>
                        <li>media:play</li>
                        <li>media:playing</li>
                        <li>media:loading</li>
                    </ul>
                </div>
            </div>
        </section>

        <script type="module" src="./scripts.js"></script>

    </body>

</html>
